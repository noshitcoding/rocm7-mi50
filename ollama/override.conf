# Ollama systemd override for MI50 (gfx906) on ROCm 7.2
# Install: sudo mkdir -p /etc/systemd/system/ollama.service.d/
#          sudo cp override.conf /etc/systemd/system/ollama.service.d/
#          sudo systemctl daemon-reload && sudo systemctl restart ollama
[Service]
Environment=OLLAMA_HOST=0.0.0.0:11434
Environment=OLLAMA_LLM_LIBRARY=rocm
Environment=OLLAMA_CONTEXT_LENGTH=8192
Environment=OLLAMA_MAX_LOADED_MODELS=1
Environment=OLLAMA_KEEP_ALIVE=60s
Environment=LD_LIBRARY_PATH=/opt/rocm/lib:/opt/rocm/lib64:/usr/local/lib/ollama/rocm
Environment=OLLAMA_FLASH_ATTENTION=1
Environment=GPU_MAX_HW_QUEUES=2
Environment=OLLAMA_DEBUG=INFO
Environment=GGML_CUDA_INIT=1
